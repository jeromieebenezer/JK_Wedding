<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Wedding Seating</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.1.slim.min.js"></script>
    <script type="text/javascript" src="./guests.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto&family=Open+Sans&family=Great+Vibes&display=swap" rel="stylesheet" />
    <style>
      @supports(padding:max(0px)) {
        body, header, footer {
          padding-left: min(0vmin, env(safe-area-inset-left));
          padding-right: min(0vmin, env(safe-area-inset-right));
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        color: #000;
        background: #000;
        padding: 0;
        margin: 0;
        font-family: 'Roboto', sans-serif;
        scroll-behavior: smooth;
      }

      .container {
        height: 100%;
      }

      /* ── Header / Hero ── */
      .header {
        height: 550px;
        overflow: hidden;
        position: relative;
      }

      .header img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 35%;
        display: block;
      }

      .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.5) 100%);
        z-index: 1;
      }

      .container-title {
        padding: 10px;
        top: 77%;
        position: absolute;
        font-family: monospace;
        color: #fff;
        font-size: 17px;
        text-align: center;
      }

      /* ── Search Area ── */
      .search {
        background: #fff;
        height: 40%;
        top: -10%;
        border-radius: 30px;
        position: relative;
        z-index: 1;
        transition: all 1s;
      }

      #search {
        padding: 16px;
        font-size: 14px;
        width: 100%;
        border-radius: 30px;
        border: 0;
        font-family: 'Montserrat';
        box-shadow: 0 0 3px #aaa;
        -webkit-appearance: none;
        -webkit-box-shadow: 0 0 3px #aaa;
        outline: none;
      }

      #search:focus {
        box-shadow: 0 0 6px #b08968;
        -webkit-box-shadow: 0 0 6px #b08968;
      }

      /* ── Welcome Text ── */
      #welcomeText {
        font-family: 'Montserrat';
        padding: 10px;
        text-align: center;
      }

      #welcomeText .couple-names {
        font-family: 'Great Vibes', cursive;
        font-size: clamp(18px, 4vw, 26px);
        color: #b08968;
        margin: 5px 0;
        word-spacing: 2px;
        white-space: nowrap;
      }

      #welcomeText p {
        color: #555;
        font-size: 14px;
      }

      .mc-info {
        margin-top: 28px;
        font-family: 'Montserrat', sans-serif;
        text-align: center;
      }

      .mc-label {
        display: block;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #b08968;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .mc-names {
        font-size: 14px;
        color: #3a3a3a;
      }

      /* ── Results ── */
      #result {
        padding: 10px;
        background: #fff;
      }

      #resultbox {
        border-radius: 6px;
        background: #fff;
        padding: 10px;
        font-size: 20px;
        display: flex;
        flex-direction: row;
        cursor: pointer;
        transition: background 0.2s;
      }

      #resultbox:hover {
        background: #f9f5f0;
      }

      #resultbox #header {
        padding-left: 14px;
        font-size: 19px;
        text-transform: uppercase;
        margin-top: 6px;
        font-family: 'Montserrat';
        white-space: nowrap;
      }

      #resultbox p {
        font-size: 15px;
        padding-left: 12px;
      }

      .tableNumber {
        font-size: 45px;
        color: #b08968;
        display: flex;
        justify-content: center;
      }

      .tableNameSlack {
        font-size: 12px;
        padding: 10px;
        color: #999;
        font-family: 'Montserrat';
        letter-spacing: 2px;
      }

      .lastName {
        font-family: 'Montserrat';
        font-size: 30px;
        text-transform: uppercase;
        font-weight: 600;
        margin-left: 13px;
        white-space: nowrap;
      }

      .more {
        position: absolute;
        right: 25px;
        margin-top: 7px;
      }

      .seeMore {
        font-family: 'Montserrat';
        padding: 10px 16px 15px;
        font-size: 13px;
        color: #b08968;
        cursor: pointer;
      }

      .seeMore:hover {
        text-decoration: underline;
      }

      .information {
        padding: 0 16px 10px;
        font-family: 'Montserrat';
        font-size: 12px;
        color: #555;
      }

      .sameTable {
        overflow: scroll;
        display: none;
      }

      .sameTable div {
        padding: 5px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sameTable .guest-name {
        white-space: nowrap;
      }

      .socialMedia {
        padding: 15px;
        font-family: 'Montserrat';
        text-align: center;
        color: #555;
      }

      /* ── User Avatar SVG fallback ── */
      .avatar {
        width: 35px;
        height: 35px;
        background: #e8ddd3;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .avatar svg {
        width: 20px;
        height: 20px;
        fill: #b08968;
      }

      .avatar-lg {
        width: 50px;
        height: 50px;
      }

      .avatar-lg svg {
        width: 28px;
        height: 28px;
      }

      /* ── Placeholder header image ── */
      .header-placeholder {
        width: 100%;
        height: 350px;
        background: linear-gradient(135deg, #d4a574 0%, #b08968 30%, #8c6b4f 60%, #6b4f3a 100%);

        align-items: center;
        justify-content: center;
      }

        text-align: center;
        z-index: 0;

        font-size: 48px;
        margin: 0;
        font-weight: 400;

      .header-placeholder .hero-text p {

        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 8px;
        opacity: 0.85;

      body {
        background: #fff;

      /* ── Breadcrumb ── */
      .breadcrumb {

        font-size: 11px;
        color: #aaa;
        background: #fff;
        letter-spacing: 0.5px;
      }

      .breadcrumb a {

        text-decoration: none;
      }

      .breadcrumb a:hover { text-decoration: underline; }

      .breadcrumb span { color: #ccc; margin: 0 6px; }

      /* ── Page footer ── */
      .page-footer {
        text-align: center;
        padding: 24px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: #ccc;
        letter-spacing: 1px;
        background: #fff;
      }

      .page-footer a {
        color: #d4b896;
        text-decoration: none;
      }

      .page-footer a:hover { color: #b08968; }

      .no-results {
        text-align: center;
        padding: 30px 20px;
        font-family: 'Montserrat';
        color: #999;
        font-size: 14px;
      }

    <script>
      /*
       * ═══════════════════════════════════════════════
       *   GUEST DATA — Loaded from guests.xlsx
       *   Excel must have columns: "Guest" and "Table"
       * ═══════════════════════════════════════════════
       */
      let array = guestData;

      const PARTNER_1 = "Jeromie";
      const PARTNER_2 = "Karen";
      const WEDDING_DATE = "May 2, 2026";

      // SVG avatar icon (no external image needed)
      const AVATAR_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`;

      function getEveryoneFromTable(table) {
        const tableOn = array.filter(item => String(item.Table) === String(table));
        let names = "";
        tableOn.forEach((guest) => {
          names += `<div><div class="avatar">${AVATAR_SVG}</div><div class="guest-name">${guest.Guest}</div></div>`;
        });
        // Toggle only the sameTable for this specific result
        event.stopPropagation();
        const el = event.currentTarget;
        const wrapper = el.closest('.result-wrapper');
        const sameTableDiv = wrapper.querySelector('.sameTable');
        const infoDiv = wrapper.querySelector('.information');
        const tableDiv = sameTableDiv.querySelector('.table-guests');

        if (sameTableDiv.style.display === 'block') {
          sameTableDiv.style.display = 'none';
          return;
        }

        tableDiv.innerHTML = names;
        infoDiv.innerHTML = `This table has <b>${tableOn.length}</b> guests. You will be seated with the guests shown below.`;
        sameTableDiv.style.display = 'block';
      }

      $(document).ready(function () {
        // Set dynamic content
        $('.couple-names').html(`${PARTNER_1}&nbsp;&amp;&nbsp;${PARTNER_2}'s&nbsp;Wedding`);
        document.title = `${PARTNER_1} & ${PARTNER_2} — Wedding Seating`;

        $('#search').focus(() => {
          $('.search').css({ "top": "-30%", height: "100%" });
        });

        $('#search').on('input', function () {
          let input = $(this).val().toLowerCase();

          if (input.length === 0) {
            $('#welcomeText').show();
            $('.search').css({ "top": "-10%", height: "40%" });
            $('#result').hide();
            return;
          }

          $('#welcomeText').hide();
          $('#result').show();
          $('.search').css({ "top": "-30%", height: "100%" });
          $('#result').html('');

          const results = array.filter(object =>
            Object.values(object).some(val =>
              String(val).toLowerCase().includes(input)
            )
          );

          if (results.length === 0) {
            $('#result').html('<div class="no-results">No guests found. Try searching by first or last name.</div>');
            return;
          }

          results.forEach((result) => {
            const parts = result.Guest.split(' ');
            const first = parts[0];
            const last = parts.slice(1).join(' ');
            const tableArg = typeof result.Table === 'number' ? result.Table : `'${result.Table}'`;
            const tableLabel = typeof result.Table === 'number' ? result.Table : result.Table;

            $('#result').append(`
              <div class="result-wrapper">
                <div id="resultbox" onclick="getEveryoneFromTable(${tableArg})">
                  <div>
                    <span class="tableNumber"><b>${tableLabel}</b></span>
                    <span class="tableNameSlack">${typeof result.Table === 'number' ? 'TABLE' : ''}</span>
                  </div>
                  <div style="margin-top:7px;">
                    <span id="header"><b>${first}</b></span><br />
                    <span class="lastName">${last}</span>
                  </div>
                  <div class="more">
                    <div class="avatar avatar-lg">${AVATAR_SVG}</div>
                  </div>
                </div>
                <div class="seeMore" onclick="getEveryoneFromTable(${tableArg})">Click to see everyone at Table ${tableLabel}</div>
                <div class="information"></div>
                <div class="sameTable">
                  <div class="table-guests"></div>
                </div>
              </div>
            `);
          });
        });
      });
    </script>
  </head>
