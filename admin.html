<!DOCTYPE html>
<html lang="en">
<head>
  <title>Seating Chart Manager — Jeromie & Karen</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="./guests.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f5f0eb;
      color: #3a3a3a;
      min-height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e0d5c8;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #b08968;
    }

    .topbar .stats {
      font-size: 12px;
      color: #888;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #b08968;
      color: #fff;
    }

    .btn-primary:hover { background: #9a7555; }

    .btn-secondary {
      background: #e8ddd3;
      color: #6b4f3a;
    }

    .btn-secondary:hover { background: #d4c5b5; }

    .btn-danger {
      background: #e74c3c;
      color: #fff;
    }

    .btn-danger:hover { background: #c0392b; }

    /* ── Search / Filter Bar ── */
    .filter-bar {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #e0d5c8;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .filter-bar input {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      padding: 10px 16px;
      border: 1px solid #e0d5c8;
      border-radius: 8px;
      outline: none;
      flex: 1;
      max-width: 400px;
    }

    .filter-bar input:focus {
      border-color: #b08968;
      box-shadow: 0 0 0 3px rgba(176,137,104,0.15);
    }

    /* ── Layout ── */
    .main {
      display: flex;
      height: calc(100vh - 120px);
    }

    /* ── Unassigned Panel ── */
    .unassigned-panel {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e0d5c8;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid #f0ebe5;
      font-size: 13px;
      font-weight: 600;
      color: #b08968;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header .count {
      background: #e8ddd3;
      color: #6b4f3a;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* ── Tables Grid ── */
    .tables-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .tables-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .table-card {
      background: #fff;
      border-radius: 12px;
      border: 2px solid #f0ebe5;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }

    .table-card.drag-over {
      border-color: #b08968;
      box-shadow: 0 0 0 3px rgba(176,137,104,0.2);
    }

    .table-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #faf7f4;
      border-bottom: 1px solid #f0ebe5;
    }

    .table-card-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: #b08968;
    }

    .table-card-header .guest-count {
      font-size: 11px;
      color: #999;
    }

    .edit-table-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      margin-left: 6px;
      line-height: 1;
    }

    .edit-table-btn:hover {
      color: #b08968;
      background: #f0ebe5;
    }

    .table-card-body {
      padding: 8px;
      min-height: 60px;
    }

    /* ── Guest Chip ── */
    .guest-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      margin: 4px 0;
      background: #faf7f4;
      border-radius: 8px;
      font-size: 13px;
      cursor: grab;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .guest-chip:hover {
      background: #f0ebe5;
      border-color: #d4c5b5;
    }

    .guest-chip.dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }

    .guest-chip .name {
      font-weight: 500;
      white-space: nowrap;
    }

    .guest-chip .tag {
      font-size: 10px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .guest-chip .remove-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 16px;
      padding: 0 0 0 8px;
      line-height: 1;
    }

    .guest-chip .remove-btn:hover { color: #e74c3c; }

    /* ── Add Guest Form ── */
    .add-guest-row {
      display: flex;
      gap: 8px;
      padding: 8px;
      border-top: 1px solid #f0ebe5;
    }

    .add-guest-row input {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid #e0d5c8;
      border-radius: 6px;
      outline: none;
      flex: 1;
    }

    .add-guest-row input:focus {
      border-color: #b08968;
    }

    .add-guest-row button {
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      background: #b08968;
      color: #fff;
      border: none;
      border-radius: 6px;
      width: 32px;
      cursor: pointer;
    }

    .add-guest-row button:hover { background: #9a7555; }

    /* ── Toast Notification ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #333;
      color: #fff;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
    }

    .modal h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #b08968;
    }

    .modal input {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #e0d5c8;
      border-radius: 8px;
      width: 100%;
      outline: none;
      margin-bottom: 12px;
    }

    .modal input:focus { border-color: #b08968; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    /* ── GitHub Token Banner ── */
    .token-banner {
      background: #fff8f0;
      border-bottom: 1px solid #f0dfc8;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #6b4f3a;
      font-family: 'Montserrat', sans-serif;
    }

    .token-banner input {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      padding: 6px 12px;
      border: 1px solid #e0d5c8;
      border-radius: 6px;
      outline: none;
      width: 260px;
    }

    .token-banner input:focus { border-color: #b08968; }

    .token-status {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 10px;
    }

    .token-status.ok { background: #e8f5e9; color: #2e7d32; }
    .token-status.missing { background: #fce4ec; color: #c62828; }

    /* ── Breadcrumb ── */
    .breadcrumb {
      padding: 8px 24px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      color: #aaa;
      background: #faf7f4;
      border-bottom: 1px solid #e0d5c8;
      letter-spacing: 0.5px;
    }

    .breadcrumb a {
      color: #b08968;
      text-decoration: none;
    }

    .breadcrumb a:hover { text-decoration: underline; }

    .breadcrumb span { color: #ccc; margin: 0 6px; }

    /* ── Chip Action Buttons ── */
    .chip-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .action-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .action-btn:hover { color: #b08968; background: #f0ebe5; }
    .action-btn.delete:hover { color: #e74c3c; background: #fce4ec; }

    .remove-table-btn:hover { color: #e74c3c !important; background: #fce4ec !important; }

    /* ── Passcode Gate ── */
    .passcode-gate {
      position: fixed;
      inset: 0;
      background: #faf7f4;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .passcode-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      max-width: 300px;
      width: 90%;
    }

    .passcode-box h2 {
      font-size: 18px;
      font-weight: 600;
      color: #b08968;
      margin-bottom: 6px;
    }

    .passcode-box p {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 24px;
    }

    .passcode-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .passcode-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #d4c5b5;
      background: transparent;
      transition: background 0.2s, border-color 0.2s;
    }

    .passcode-dot.filled {
      background: #b08968;
      border-color: #b08968;
    }

    .passcode-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .key-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 600;
      background: #f5f0eb;
      border: none;
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      color: #3a3a3a;
      transition: background 0.15s;
    }

    .key-btn:hover { background: #e8ddd3; }
    .key-btn:active { background: #d4c5b5; }

    .key-btn.key-del { font-size: 16px; color: #888; }
    .key-btn.key-empty { background: transparent; cursor: default; }
    .key-btn.key-empty:hover { background: transparent; }

    .passcode-error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 14px;
      min-height: 18px;
      font-weight: 500;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .unassigned-panel { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid #e0d5c8; }
      .tables-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Passcode Gate -->
  <div class="passcode-gate" id="passcodeGate">
    <div class="passcode-box">
      <h2>Seating Admin</h2>
      <p>Enter passcode to continue</p>
      <div class="passcode-dots">
        <div class="passcode-dot" id="dot0"></div>
        <div class="passcode-dot" id="dot1"></div>
        <div class="passcode-dot" id="dot2"></div>
        <div class="passcode-dot" id="dot3"></div>
      </div>
      <div class="passcode-keypad">
        <button class="key-btn" onclick="keyPress('1')">1</button>
        <button class="key-btn" onclick="keyPress('2')">2</button>
        <button class="key-btn" onclick="keyPress('3')">3</button>
        <button class="key-btn" onclick="keyPress('4')">4</button>
        <button class="key-btn" onclick="keyPress('5')">5</button>
        <button class="key-btn" onclick="keyPress('6')">6</button>
        <button class="key-btn" onclick="keyPress('7')">7</button>
        <button class="key-btn" onclick="keyPress('8')">8</button>
        <button class="key-btn" onclick="keyPress('9')">9</button>
        <button class="key-btn key-empty"></button>
        <button class="key-btn" onclick="keyPress('0')">0</button>
        <button class="key-btn key-del" onclick="keyDelete()">⌫</button>
      </div>
      <div class="passcode-error" id="passcodeError"></div>
    </div>
  </div>

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a href="./index.html">Home</a>
    <span>›</span>
    <a href="./seatingchart.html">Seating Chart</a>
    <span>›</span>
    Admin
  </nav>

  <!-- Top Bar -->
  <div class="topbar">
    <div>
      <h1>Seating Chart Manager</h1>
      <span class="stats" id="statsText">Loading...</span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-secondary" onclick="addNewTable()">+ Add Table</button>
      <button class="btn btn-secondary" onclick="exportDataAs()" title="Choose where to save">Save As…</button>
      <button class="btn btn-primary" onclick="exportData()">Save</button>
    </div>
  </div>

  <!-- GitHub Token Banner -->
  <div class="token-banner">
    <span>🔑 GitHub Token:</span>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="saveToken()" />
    <span class="token-status" id="tokenStatus">—</span>
    <span style="color:#999; margin-left:4px;">
      Needed to save changes live.
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=JK+Wedding+Admin" target="_blank" style="color:#b08968;">Generate token ↗</a>
    </span>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <input type="text" id="searchGuest" placeholder="Search guests..." oninput="filterGuests()" />
  </div>

  <!-- Main Layout -->
  <div class="main">
    <!-- Unassigned Guests -->
    <div class="unassigned-panel">
      <div class="panel-header">
        Unassigned
        <span class="count" id="unassignedCount">0</span>
      </div>
      <div class="panel-list" id="unassignedList"
           ondrop="dropToUnassigned(event)"
           ondragover="allowDrop(event)"
           ondragenter="this.style.background='#f0ebe5'"
           ondragleave="this.style.background=''">
      </div>
      <div class="add-guest-row">
        <input type="text" id="newGuestName" placeholder="New guest name..." onkeydown="if(event.key==='Enter')addNewGuest()" />
        <button onclick="addNewGuest()">+</button>
      </div>
    </div>

    <!-- Tables Area -->
    <div class="tables-area">
      <div class="tables-grid" id="tablesGrid"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Rename Table Modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal">
      <h3>Rename Table</h3>
      <input type="number" id="renameTableInput" placeholder="New table number..." />
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeRenameModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmRename()">Rename</button>
      </div>
    </div>
  </div>

  <!-- Move Modal -->
  <div class="modal-overlay" id="moveModal">
    <div class="modal">
      <h3>Move Guest to Table</h3>
      <input type="number" id="moveTableInput" placeholder="Enter table number..." />
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeMoveModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmMove()">Move</button>
      </div>
    </div>
  </div>

  <!-- Edit Guest Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>Edit Guest Name</h3>
      <input type="text" id="editGuestInput" placeholder="Guest name..." />
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ── Passcode Lock ──
    const PASSCODE = '1523';
    let passcodeEntered = '';

    function keyPress(digit) {
      if (passcodeEntered.length >= 4) return;
      passcodeEntered += digit;
      updateDots();
      if (passcodeEntered.length === 4) setTimeout(checkPasscode, 150);
    }

    function keyDelete() {
      passcodeEntered = passcodeEntered.slice(0, -1);
      updateDots();
      document.getElementById('passcodeError').textContent = '';
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById(`dot${i}`).classList.toggle('filled', i < passcodeEntered.length);
      }
    }

    function checkPasscode() {
      if (passcodeEntered === PASSCODE) {
        document.getElementById('passcodeGate').style.display = 'none';
        sessionStorage.setItem('jk_admin_auth', '1');
      } else {
        document.getElementById('passcodeError').textContent = 'Incorrect passcode';
        passcodeEntered = '';
        updateDots();
      }
    }

    if (sessionStorage.getItem('jk_admin_auth') === '1') {
      document.getElementById('passcodeGate').style.display = 'none';
    }

    // ── State ──
    let guests = guestData.map((g, i) => ({ ...g, id: i }));
    let nextId = guests.length;
    let draggedGuestId = null;
    let moveGuestId = null;

    function getTableNumbers() {
      const nums = new Set();
      guests.forEach(g => { if (typeof g.Table === 'number') nums.add(g.Table); });
      return [...nums].sort((a, b) => a - b);
    }

    function getGuestsForTable(table) {
      return guests.filter(g => g.Table === table);
    }

    function getUnassigned() {
      return guests.filter(g => g.Table === null || g.Table === undefined || g.Table === '');
    }

    // ── Render ──
    function render(filter = '') {
      const tables = getTableNumbers();
      const unassigned = getUnassigned();
      const filterLower = filter.toLowerCase();

      // Stats
      document.getElementById('statsText').textContent =
        `${guests.length} guests across ${tables.length} tables`;

      // Unassigned panel
      const ul = document.getElementById('unassignedList');
      ul.innerHTML = '';
      unassigned
        .filter(g => !filterLower || g.Guest.toLowerCase().includes(filterLower))
        .forEach(g => {
          ul.innerHTML += guestChipHTML(g);
        });
      document.getElementById('unassignedCount').textContent = unassigned.length;

      // Tables
      const grid = document.getElementById('tablesGrid');
      grid.innerHTML = '';
      tables.forEach(t => {
        const tableGuests = getGuestsForTable(t)
          .filter(g => !filterLower || g.Guest.toLowerCase().includes(filterLower));
        const allTableGuests = getGuestsForTable(t);

        // Don't hide entire table if filter is active but no matches
        if (filterLower && tableGuests.length === 0) return;

        grid.innerHTML += `
          <div class="table-card" id="table-${t}"
               ondrop="dropToTable(event, ${t})"
               ondragover="allowDrop(event)"
               ondragenter="this.classList.add('drag-over')"
               ondragleave="this.classList.remove('drag-over')">
            <div class="table-card-header">
              <div style="display:flex;align-items:center;gap:4px;">
                <h3>Table ${t}</h3>
                <button class="edit-table-btn" onclick="openRenameModal(${t})" title="Rename table">&#9998;</button>
                <button class="edit-table-btn remove-table-btn" onclick="removeTable(${t})" title="Remove table">&times;</button>
              </div>
              <span class="guest-count">${allTableGuests.length} guests</span>
            </div>
            <div class="table-card-body">
              ${(filterLower ? tableGuests : allTableGuests).map(g => guestChipHTML(g)).join('')}
            </div>
          </div>
        `;
      });
    }

    function guestChipHTML(g) {
      return `
        <div class="guest-chip" draggable="true"
             ondragstart="dragStart(event, ${g.id})"
             ondragend="dragEnd(event)"
             id="guest-${g.id}">
          <span class="name">${g.Guest}</span>
          <div class="chip-actions">
            <button class="action-btn" onclick="openEditModal(${g.id})" title="Edit name">&#9998;</button>
            <button class="action-btn" onclick="openMoveModal(${g.id})" title="Move to table">&harr;</button>
            <button class="action-btn delete" onclick="removeGuest(${g.id})" title="Remove">&times;</button>
          </div>
        </div>
      `;
    }

    // ── Drag & Drop ──
    function dragStart(e, id) {
      draggedGuestId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => e.target.classList.add('dragging'), 0);
    }

    function dragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.table-card').forEach(c => c.classList.remove('drag-over'));
      document.getElementById('unassignedList').style.background = '';
    }

    function allowDrop(e) { e.preventDefault(); }

    function dropToTable(e, table) {
      e.preventDefault();
      if (draggedGuestId === null) return;
      const guest = guests.find(g => g.id === draggedGuestId);
      if (guest) {
        guest.Table = table;
        toast(`Moved ${guest.Guest} to Table ${table}`);
      }
      draggedGuestId = null;
      render(document.getElementById('searchGuest').value);
    }

    function dropToUnassigned(e) {
      e.preventDefault();
      if (draggedGuestId === null) return;
      const guest = guests.find(g => g.id === draggedGuestId);
      if (guest) {
        guest.Table = null;
        toast(`${guest.Guest} moved to unassigned`);
      }
      draggedGuestId = null;
      render(document.getElementById('searchGuest').value);
    }

    // ── Move Modal ──
    function openMoveModal(id) {
      moveGuestId = id;
      document.getElementById('moveModal').classList.add('active');
      const input = document.getElementById('moveTableInput');
      input.value = '';
      input.focus();
    }

    function closeMoveModal() {
      document.getElementById('moveModal').classList.remove('active');
      moveGuestId = null;
    }

    function confirmMove() {
      const tableNum = parseInt(document.getElementById('moveTableInput').value);
      if (isNaN(tableNum)) return;
      const guest = guests.find(g => g.id === moveGuestId);
      if (guest) {
        guest.Table = tableNum;
        toast(`Moved ${guest.Guest} to Table ${tableNum}`);
      }
      closeMoveModal();
      render(document.getElementById('searchGuest').value);
    }

    // ── Actions ──
    function addNewGuest() {
      const input = document.getElementById('newGuestName');
      const name = input.value.trim();
      if (!name) return;
      guests.push({ Guest: name, Table: null, id: nextId++ });
      input.value = '';
      toast(`Added ${name}`);
      render(document.getElementById('searchGuest').value);
    }

    function addNewTable() {
      const tables = getTableNumbers();
      const next = tables.length > 0 ? Math.max(...tables) + 1 : 1;
      // Add a placeholder guest so the table appears (or just render empty)
      // We'll just render with an empty table by adding to state
      guests.push({ Guest: '(empty seat)', Table: next, id: nextId++ });
      toast(`Created Table ${next}`);
      render(document.getElementById('searchGuest').value);
    }

    function filterGuests() {
      render(document.getElementById('searchGuest').value);
    }

    // ── GitHub Config ──
    const GH_OWNER = 'jeromieebenezer';
    const GH_REPO  = 'JK_Wedding';
    const GH_FILE  = 'guests.js';
    const GH_BRANCH = 'main';

    function getToken() { return localStorage.getItem('jk_gh_token') || ''; }

    function saveToken() {
      const t = document.getElementById('ghToken').value.trim();
      localStorage.setItem('jk_gh_token', t);
      updateTokenStatus();
    }

    function updateTokenStatus() {
      const t = getToken();
      const el = document.getElementById('tokenStatus');
      if (t && t.startsWith('ghp_')) {
        el.textContent = '✓ Token saved';
        el.className = 'token-status ok';
      } else if (t) {
        el.textContent = '✓ Token saved';
        el.className = 'token-status ok';
      } else {
        el.textContent = 'No token';
        el.className = 'token-status missing';
      }
    }

    function buildGuestsJS() {
      const validGuests = guests.filter(g => g.Guest && g.Guest !== '(empty seat)' && g.Table !== null);
      const lines = validGuests.map(g => {
        if (typeof g.Table === 'number') {
          return `  { "Guest": "${g.Guest}", "Table": ${g.Table} }`;
        }
        return `  { "Guest": "${g.Guest}", "Table": "${g.Table}" }`;
      });
      return { js: `const guestData = [\n${lines.join(',\n')}\n];\n`, count: validGuests.length };
    }

    async function exportData() {
      const { js, count } = buildGuestsJS();
      const token = getToken();

      if (token) {
        // ── Push directly to GitHub ──
        try {
          toast('Saving to GitHub…');

          // 1. Get current file SHA
          const getRes = await fetch(
            `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`,
            { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } }
          );
          if (!getRes.ok) throw new Error(`GitHub API error: ${getRes.status}`);
          const fileData = await getRes.json();
          const sha = fileData.sha;

          // 2. Commit updated file
          const content = btoa(unescape(encodeURIComponent(js)));
          const putRes = await fetch(
            `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`,
            {
              method: 'PUT',
              headers: {
                Authorization: `token ${token}`,
                Accept: 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                message: `Update seating chart (${count} guests)`,
                content,
                sha,
                branch: GH_BRANCH
              })
            }
          );
          if (!putRes.ok) {
            const err = await putRes.json();
            throw new Error(err.message || putRes.status);
          }

          toast(`✓ Saved ${count} guests — live site updates in ~30 seconds`);
        } catch (err) {
          console.error(err);
          toast(`GitHub save failed: ${err.message}`);
        }

      } else {
        // ── Fallback: download ──
        const blob = new Blob([js], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'guests.js';
        a.click();
        URL.revokeObjectURL(url);
        toast('Downloaded guests.js — add a GitHub token to save directly to the live site');
      }
    }

    async function exportDataAs() { await exportData(); }

    // ── Toast ──
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._timeout);
      el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── Rename Table ──
    let renameTargetTable = null;

    function openRenameModal(tableNum) {
      renameTargetTable = tableNum;
      const input = document.getElementById('renameTableInput');
      input.value = tableNum;
      document.getElementById('renameModal').classList.add('active');
      setTimeout(() => { input.focus(); input.select(); }, 50);
    }

    function closeRenameModal() {
      document.getElementById('renameModal').classList.remove('active');
      renameTargetTable = null;
    }

    function confirmRename() {
      const newNum = parseInt(document.getElementById('renameTableInput').value);
      if (isNaN(newNum)) return;
      if (newNum === renameTargetTable) { closeRenameModal(); return; }
      if (getTableNumbers().includes(newNum)) {
        toast(`Table ${newNum} already exists — guests will be merged`);
      }
      // Reassign all guests from old table number to new
      guests.forEach(g => { if (g.Table === renameTargetTable) g.Table = newNum; });
      toast(`Table ${renameTargetTable} renamed to Table ${newNum}`);
      closeRenameModal();
      render(document.getElementById('searchGuest').value);
    }

    // ── Remove Guest ──
    function removeGuest(id) {
      const guest = guests.find(g => g.id === id);
      if (!guest) return;
      if (!confirm(`Remove "${guest.Guest}" from the seating chart?`)) return;
      guests = guests.filter(g => g.id !== id);
      toast(`Removed ${guest.Guest}`);
      render(document.getElementById('searchGuest').value);
    }

    // ── Remove Table ──
    function removeTable(tableNum) {
      const tableGuests = getGuestsForTable(tableNum);
      const realGuests = tableGuests.filter(g => g.Guest !== '(empty seat)');
      const msg = realGuests.length > 0
        ? `Remove Table ${tableNum} and move its ${realGuests.length} guest(s) to Unassigned?`
        : `Remove Table ${tableNum}?`;
      if (!confirm(msg)) return;
      // Move real guests to unassigned, remove placeholders
      tableGuests.forEach(g => {
        if (g.Guest !== '(empty seat)') g.Table = null;
      });
      guests = guests.filter(g => !(g.Guest === '(empty seat)' && g.Table === tableNum));
      toast(`Table ${tableNum} removed`);
      render(document.getElementById('searchGuest').value);
    }

    // ── Edit Guest Name ──
    let editGuestId = null;

    function openEditModal(id) {
      editGuestId = id;
      const guest = guests.find(g => g.id === id);
      if (!guest) return;
      const input = document.getElementById('editGuestInput');
      input.value = guest.Guest;
      document.getElementById('editModal').classList.add('active');
      setTimeout(() => { input.focus(); input.select(); }, 50);
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      editGuestId = null;
    }

    function confirmEdit() {
      const newName = document.getElementById('editGuestInput').value.trim();
      if (!newName) return;
      const guest = guests.find(g => g.id === editGuestId);
      if (guest) {
        const oldName = guest.Guest;
        guest.Guest = newName;
        toast(`Renamed "${oldName}" → "${newName}"`);
      }
      closeEditModal();
      render(document.getElementById('searchGuest').value);
    }

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeMoveModal(); closeRenameModal(); closeEditModal(); }
      if (e.key === 'Enter' && document.getElementById('moveModal').classList.contains('active')) confirmMove();
      if (e.key === 'Enter' && document.getElementById('renameModal').classList.contains('active')) confirmRename();
      if (e.key === 'Enter' && document.getElementById('editModal').classList.contains('active')) confirmEdit();
    });

    // ── Init ──
    const savedToken = getToken();
    if (savedToken) document.getElementById('ghToken').value = savedToken;
    updateTokenStatus();
    render();
  </script>
</body>
</html>
